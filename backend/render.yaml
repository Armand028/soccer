services:
  - type: web
    name: soccer-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInterval: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
    autoDeploy: true
